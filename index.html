<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Space Scene</title>
    <style>
        body { margin: 0; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, player;
        let controls;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            
            // Player
            const geometry = new THREE.BoxGeometry(1, 1, 1);
            const material = new THREE.MeshBasicMaterial({color: 0x00ff00});
            player = new THREE.Mesh(geometry, material);
            scene.add(player);

            // Floor
            const floorTexture = new THREE.TextureLoader().load('path/to/floor_texture.jpg');
            const floorGeometry = new THREE.PlaneGeometry(100, 100);
            const floorMaterial = new THREE.MeshBasicMaterial({ map: floorTexture });
            const floor = new THREE.Mesh(floorGeometry, floorMaterial);
            floor.rotation.x = - Math.PI / 2;
            scene.add(floor);

            // Walls
            const wallTexture = new THREE.TextureLoader().load('path/to/wall_texture.jpg');
            const wallMaterial = new THREE.MeshBasicMaterial({ map: wallTexture });

            const leftWall = new THREE.Mesh(new THREE.PlaneGeometry(100, 50), wallMaterial);
            leftWall.rotation.y = Math.PI / 2;
            leftWall.position.x = -50;
            scene.add(leftWall);

            const rightWall = new THREE.Mesh(new THREE.PlaneGeometry(100, 50), wallMaterial);
            rightWall.rotation.y = -Math.PI / 2;
            rightWall.position.x = 50;
            scene.add(rightWall);

            camera.position.z = 5;

            // Events
            window.addEventListener('resize', onWindowResize, false);
            document.addEventListener('keydown', onDocumentKeyDown, false);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onDocumentKeyDown(event) {
            const moveAmount = 0.1;
            switch (event.key) {
                case 'w':
                    player.position.z -= moveAmount;
                    break;
                case 's':
                    player.position.z += moveAmount;
                    break;
                case 'a':
                    player.position.x -= moveAmount;
                    break;
                case 'd':
                    player.position.x += moveAmount;
                    break;
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        init();
        animate();
    </script>
</body>
</html>
