<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Store</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="storeCanvas"></canvas>
    <script>
        const canvas = document.getElementById('storeCanvas');
        const gl = canvas.getContext('webgl');
        if (!gl) { console.error('WebGL not supported'); }

        // Initialize the WebGL context and set the viewport
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        gl.viewport(0, 0, canvas.width, canvas.height);

        // Basic movement variables
        let cameraPos = [0, 1, -5];
        let cameraFront = [0, 0, 1];
        let cameraUp = [0, 1, 0];
        let speed = 0.1;

        document.addEventListener('keydown', function(event) {
            switch(event.key) {
                case 'w':
                    cameraPos[2] += speed;
                    break;
                case 's':
                    cameraPos[2] -= speed;
                    break;
                case 'a':
                    cameraPos[0] -= speed;
                    break;
                case 'd':
                    cameraPos[0] += speed;
                    break;
            }
        });

        function draw() {
            gl.clearColor(0.5, 0.5, 0.5, 1.0);
            gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
            // Draw the store here
            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
