<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Space Game</title>
    <style>
        body { margin: 0; }
        canvas { display: block; }
    </style>
    <script src="https://threejs.org/build/three.js"></script>
    <script src="https://threejs.org/examples/js/controls/PointerLockControls.js"></script>
    <script src="https://threejs.org/examples/js/libs/stats.min.js"></script>
</head>
<body>
    <script>
    let scene, camera, renderer, controls;
    let playerSpeed = 0.1;
    let jumpSpeed = 0.2;
    let isJumping = false;
    let velocities = new THREE.Vector3();

    init();

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        controls = new THREE.PointerLockControls(camera, document.body);
        scene.add(controls.getObject());

        // Setup floor
        const floorGeometry = new THREE.PlaneGeometry(20, 20);
        const floorMaterial = new THREE.MeshBasicMaterial({color: 0x777777});
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.rotation.x = - Math.PI / 2;
        scene.add(floor);

        // Setup walls
        const wallGeometry = new THREE.BoxGeometry(0.1, 2, 20);
        const wallMaterial = new THREE.MeshBasicMaterial({color: 0x777777});
        const wall1 = new THREE.Mesh(wallGeometry, wallMaterial);
        wall1.position.set(-10, 1, 0);
        scene.add(wall1);

        const wall2 = new THREE.Mesh(wallGeometry, wallMaterial);
        wall2.position.set(10, 1, 0);
        scene.add(wall2);

        camera.position.y = 1;
        document.body.addEventListener('click', () => controls.lock());

        document.addEventListener('keydown', handleKeyDown);
        document.addEventListener('keyup', handleKeyUp);
        animate();
    }

    function handleKeyDown(event) {
        switch (event.code) {
            case 'KeyW':
                velocities.z = -playerSpeed;
                break;
            case 'KeyS':
                velocities.z = playerSpeed;
                break;
            case 'KeyA':
                velocities.x = -playerSpeed;
                break;
            case 'KeyD':
                velocities.x = playerSpeed;
                break;
            case 'Space':
                if (!isJumping) {
                    velocities.y = jumpSpeed;
                    isJumping = true;
                }
                break;
        }
    }

    function handleKeyUp(event) {
        switch (event.code) {
            case 'KeyW':
            case 'KeyS':
                velocities.z = 0;
                break;
            case 'KeyA':
            case 'KeyD':
                velocities.x = 0;
                break;
        }
    }

    function animate() {
        requestAnimationFrame(animate);

        controls.moveRight(velocities.x);
        controls.moveForward(velocities.z);

        if (camera.position.y > 1) {
            camera.position.y += velocities.y;
            velocities.y -= 0.01; // Gravity
        }
        if (camera.position.y <= 1) {
            camera.position.y = 1;
            velocities.y = 0;
            isJumping = false;
        }

        renderer.render(scene, camera);
    }
    </script>
</body>
</html>
